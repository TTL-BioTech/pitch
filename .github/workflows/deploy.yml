name: Deploy pitch to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build JSON from Sheets
        run: npm run build:data

      - name: Detect JSON changes
        id: json_changes
        shell: bash
        run: |
          if git diff --quiet -- public/merged-feed.json public/promotions.json public/rankings.json public/data-health-report.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "JSON 與資料健康報告無變動"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "JSON 或資料健康報告有變動"
          fi

      - name: Commit updated JSON
        if: steps.json_changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/merged-feed.json public/promotions.json public/rankings.json public/data-health-report.json
          git commit -m "chore(data): refresh public json and health report"
          git push

      - name: Build site
        run: npm run build
        env:
          VITE_BASE_PATH: /pitch/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
